name: Release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)build and upload (e.g. v6.6.0)
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      PEBBLE_FIREBASE_REFRESH_TOKEN: ${{ secrets.PEBBLE_FIREBASE_REFRESH_TOKEN }}
    steps:
      - name: Resolve tag
        id: tag
        run: echo "name=${{ inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-pebble

      - name: Cache Pebble SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/.pebble-sdk
          key: pebble-sdk-latest-v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl1.2debian libfdt1 libsndio7.0 npm xvfb

      - name: Install pebble-tool
        run: pip install pebble-tool

      - name: Patch pebble-tool to replace appstore screenshots
        run: |
          # pebble publish hardcodes replaceScreenshots="false", so every
          # release appends a fresh set of screenshots to the appstore listing
          # instead of replacing the previous one. Flip it to "true" so old
          # assets are dropped. See coredevices/pebble-tool publish.py.
          publish_py=$(python3 -c "import pebble_tool.commands.publish as m; print(m.__file__)")
          before=$(grep -c '"replaceScreenshots": "false"' "$publish_py" || true)
          if [ "$before" -ne 1 ]; then
            echo "Expected exactly 1 'replaceScreenshots: false' in $publish_py, found $before" >&2
            echo "pebble-tool internals changed; review the patch." >&2
            exit 1
          fi
          sed -i 's/"replaceScreenshots": "false"/"replaceScreenshots": "true"/' "$publish_py"
          grep -n '"replaceScreenshots"' "$publish_py"

      - name: Install Pebble SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: pebble sdk install latest

      - name: Sync package.json version to release tag
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          # Embed the released version in the .pbw so the on-watch / appstore
          # version matches the GitHub release tag.
          python3 - "$version" <<'PY'
          import json, sys
          version = sys.argv[1]
          with open("package.json") as f:
              pkg = json.load(f)
          pkg["version"] = version
          with open("package.json", "w") as f:
              json.dump(pkg, f, indent=2)
              f.write("\n")
          PY
          echo "package.json version set to $version"

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 400x400x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Build demo bundle for screenshots
        run: |
          # Separate build with representative health values so screenshots show
          # real-looking metrics instead of "--". Not uploaded or published.
          NORTID_SCREENSHOT_DEMO=1 pebble build
          mkdir -p demo-build
          cp build/*.pbw demo-build/

      - name: Generate screenshots
        run: |
          set -uo pipefail
          mkdir -p screenshots

          # Capture one platform: kill any stale emulator, install, screenshot.
          # The emulator startup/teardown is timing-sensitive on CI (a fresh
          # `pebble install` can hit "Connection refused" if the previous qemu
          # hasn't released its port), so each platform gets a few attempts with
          # a clean emulator and a longer backoff before failing the release.
          capture() {
            local platform="$1"
            pebble kill >/dev/null 2>&1 || true
            sleep 3
            pebble install --emulator "$platform" demo-build/*.pbw || return 1
            sleep 6
            pebble screenshot --emulator "$platform" --no-open "screenshots/$platform.png" || return 1
          }

          for platform in aplite basalt diorite chalk emery; do
            echo "Capturing screenshot for $platform..."
            ok=0
            for attempt in 1 2 3; do
              if capture "$platform"; then ok=1; break; fi
              echo "Attempt $attempt for $platform failed; retrying after backoff..." >&2
              sleep $((attempt * 5))
            done
            if [ "$ok" -ne 1 ]; then
              echo "Failed to capture screenshot for $platform after 3 attempts" >&2
              exit 1
            fi
          done
          pebble kill >/dev/null 2>&1 || true

      - name: Build release watchface
        run: |
          # Clean rebuild without the demo flag so the uploaded/published .pbw
          # uses real health data.
          pebble clean
          pebble build

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload .pbw
          gh release upload ${{ steps.tag.outputs.name }} build/nortid.pbw --clobber

          # Upload screenshots
          for platform in aplite basalt diorite chalk emery; do
            gh release upload ${{ steps.tag.outputs.name }} screenshots/${platform}.png --clobber
          done

      - name: Publish to repebble.com appstore
        if: env.PEBBLE_FIREBASE_REFRESH_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_key="AIzaSyBZ9Cdvwwv9At2lPmc8TxyyEqSXGXejGvc"
          id_token=$(curl -fsS -X POST \
            "https://securetoken.googleapis.com/v1/token?key=${api_key}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${PEBBLE_FIREBASE_REFRESH_TOKEN}" \
            | jq -r .id_token)

          if [ -z "$id_token" ] || [ "$id_token" = "null" ]; then
            echo "Failed to refresh Firebase ID token" >&2
            exit 1
          fi

          # pebble publish requires screenshot filenames prefixed with the platform name.
          mkdir -p publish-screenshots
          for platform in aplite basalt diorite chalk emery; do
            cp "screenshots/${platform}.png" "publish-screenshots/${platform}_screenshot.png"
          done

          notes=$(gh release view "${{ steps.tag.outputs.name }}" --json body -q .body)
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"

          PEBBLE_FIREBASE_ID_TOKEN="$id_token" pebble publish \
            --non-interactive \
            --no-gif-all-platforms \
            --version "$version" \
            --description "A Pebble watchface displaying time and date in Norwegian text." \
            --release-notes "$notes" \
            --screenshots \
              publish-screenshots/aplite_screenshot.png \
              publish-screenshots/basalt_screenshot.png \
              publish-screenshots/diorite_screenshot.png \
              publish-screenshots/chalk_screenshot.png \
              publish-screenshots/emery_screenshot.png \
            --is-published

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_BODY=$(gh release view ${{ steps.tag.outputs.name }} --json body -q .body)

          NEW_BODY="${CURRENT_BODY}

          ---

          ## Screenshots

          | aplite | basalt | diorite | chalk | emery |
          |:------:|:------:|:-------:|:-----:|:-----:|
          | ![aplite](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/aplite.png) | ![basalt](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/basalt.png) | ![diorite](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/diorite.png) | ![chalk](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/chalk.png) | ![emery](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/emery.png) |
          | Pebble Classic | Pebble Time | Pebble 2 | Time Round | Time 2 |

          ## Installation

          1. Download \`nortid.pbw\` above
          2. Send to your Pebble via the Pebble app or Rebble sideloading

          To submit to Rebble appstore: [help.rebble.io/appstore-submission](https://help.rebble.io/appstore-submission/)"

          gh release edit ${{ steps.tag.outputs.name }} --notes "$NEW_BODY"
